<div class="page">
  <div class="titleBar">
    <span class="home" routerLink="" (click)="onLoadHome()">
      <span class="home-icon">🏠</span>
      <span class="home-text">Home</span>
    </span>
    <span class="title">{{ pageTitle }}</span>
    <button class="theme-toggle" [class.dark-mode-btn]="isDarkTheme" (click)="toggleTheme()" title="Toggle theme">
      <span class="theme-icon">{{ isDarkTheme ? '☀️' : '🌙' }}</span>
    </button>
  </div>
  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
